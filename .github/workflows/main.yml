name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    # Build Windows exe in GitHub-hosted Windows runner.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -U pip && pip install -r requirements.txt

      - name: Build exe
        run: python -m PyInstaller --noconfirm --clean PDFTool.spec

      - name: Verify exe
        shell: pwsh
        run: |
          if (-not (Test-Path dist/PDFTool.exe)) { throw "dist/PDFTool.exe not found" }
          $size = (Get-Item dist/PDFTool.exe).Length
          Write-Host "PDFTool.exe size: $size bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFTool-Windows
          path: dist/PDFTool.exe
          retention-days: 90

      - name: Publish Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFTool.exe
          generate_release_notes: true

