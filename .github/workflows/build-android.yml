name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_NO_PROGRESS: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flet CLI
        run: python -m pip install -U pip && pip install "flet[all]==0.28.3"

      - name: Build APK
        run: flet build apk -v

      - name: Collect APK files
        run: |
          mkdir -p dist-android
          find build -name "*.apk" -exec cp {} dist-android/ \;
          ls -lh dist-android/
          apk=$(find dist-android -name "*.apk" | head -1)
          if [ -n "$apk" ]; then
            cp "$apk" dist-android/PDFTool-universal-release.apk
            ls -lh dist-android/PDFTool-universal-release.apk
          fi

      - name: Verify APK
        run: |
          count=$(find dist-android -name "*.apk" | wc -l | tr -d ' ')
          if [ "$count" -lt 1 ]; then
            echo "No APK found"
            exit 1
          fi
          echo "Built $count APK(s)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFTool-Android
          path: dist-android/*.apk
          retention-days: 90

      - name: Publish Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-android/*.apk
          generate_release_notes: true

      - name: Job summary
        run: |
          {
            echo "## PDFTool Android 构建完成"
            echo "- 下载：本 Workflow → **Artifacts** → \`PDFTool-Android\`"
            echo "- 产物：\`PDFTool-universal-release.apk\`（含 arm64-v8a / armeabi-v7a / x86_64）"
            echo "- 手机安装：直接安装 universal 包即可，无需按 CPU 架构选择"
          } >> "$GITHUB_STEP_SUMMARY"
